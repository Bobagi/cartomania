<!doctype html>
<html lang="%lang%">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.ico" sizes="any" />
		<link rel="icon" type="image/png" href="%sveltekit.assets%/cartomania-icon-32.png" sizes="32x32" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/cartomania-icon.png" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Cartomania</title>
		<meta
			name="description"
			content="Cartomania — a fan-made digital card-battle game built around the Dracomania card collection. Not affiliated with the original creators."

	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
